workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

stages:
  - validate
  - build
  - publish
  - mirror

validate:
  stage: validate
  image: node:24-alpine
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - src/**/*
        - package.json
        - package-lock.json
        - tsconfig.json
        - .gitlab-ci.yml
  script:
    - npm ci
    - npx tsc --noEmit
    - npm test

pipeline-guard:
  stage: validate
  image: node:24-alpine
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  script:
    - echo "Pipeline OK"

build:
  stage: build
  image: node:24-alpine
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - src/**/*
        - package.json
        - package-lock.json
        - tsconfig.json
  script:
    - npm ci
    - npm run build
    - npm test
  artifacts:
    paths:
      - dist/
    expire_in: 7 days

publish-npm:
  stage: publish
  image: node:24-alpine
  id_tokens:
    NPM_ID_TOKEN:
      aud: "npm:registry.npmjs.org"
    SIGSTORE_ID_TOKEN:
      aud: sigstore
  needs:
    - job: build
      artifacts: true
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - src/**/*
        - package.json
        - package-lock.json
        - tsconfig.json
  script:
    - VERSION=$(node -p "require('./package.json').version")
    - echo "Version in package.json ${VERSION}"
    - |
      if npm view "@renfeng/terminal@${VERSION}" version 2>/dev/null; then
        echo "Version ${VERSION} already published — skipping"
        exit 0
      fi
    - npm publish --access public --ignore-scripts --provenance
    - echo "Published @renfeng/terminal@${VERSION}"

mirror-github:
  stage: mirror
  image: alpine:latest
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  before_script:
    - apk add --no-cache git openssh-client
    - mkdir -p ~/.ssh
    - printf '%s\n' "$GITHUB_DEPLOY_KEY" > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
  script:
    - git remote add github git@github.com:renfeng/terminal.git || git remote set-url github git@github.com:renfeng/terminal.git
    - git push github HEAD:main --force
  allow_failure: true
